spring.application.name=backend
server.port=8080

# MySQL Connection Settings
# We are connecting to the 'task_manager_db' you just created in Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/task_manager_db?useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Your MySQL Username
spring.datasource.username=root

# The password you set in the Terminal (e.g., NewPassword123)
spring.datasource.password=NewPassword123

# JPA / Hibernate Settings
# This tells Spring Boot to use MySQL instead of H2
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable H2 Console (since we are now using MySQL)
spring.h2.console.enabled=false